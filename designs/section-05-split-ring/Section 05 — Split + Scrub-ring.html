<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Section 05 · Editorial split + scrub-ring — 2 versions</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="_ds/evallense/tokens/colors.css">
<link rel="stylesheet" href="_ds/evallense/tokens/typography.css">
<link rel="stylesheet" href="_ds/evallense/tokens/radii-elevation.css">
<link rel="stylesheet" href="_ds/evallense/tokens/gradients-surfaces.css">
<link rel="stylesheet" href="_ds/evallense/tokens/components.css">
<link rel="stylesheet" href="_ds/evallense/styles.css">
<script src="_ds/evallense/_ds_bundle.js"></script>

<style>
  /* Registered so the ring + bars animate (count-up on reveal, like the
     EvalLense interface style guide). --v is the live value the ring fills to;
     --pct is its integer readout. */
  @property --v   { syntax:"<number>";  inherits:true; initial-value:0; }
  @property --pct { syntax:"<integer>"; inherits:true; initial-value:0; }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    font-family:var(--font-ui, -apple-system, BlinkMacSystemFont, sans-serif);
    background:#0c0c10; color:var(--fg); -webkit-font-smoothing:antialiased;
  }

  /* ── workbench chrome ─────────────────────────────────────────────── */
  .wb-bar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:22px; flex-wrap:wrap;
    padding:13px clamp(18px,4vw,40px); background:rgba(12,12,16,.82);
    backdrop-filter:blur(16px) saturate(1.5); -webkit-backdrop-filter:blur(16px) saturate(1.5);
    border-bottom:1px solid rgba(255,255,255,.1); color:#f5f5f7; }
  .wb-bar h1{ font-family:var(--font-mono); font-size:12px; font-weight:400; letter-spacing:.14em; text-transform:uppercase; margin:0; }
  .wb-replay{ margin-left:auto; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:#f5f5f7; background:var(--lens); border:0; border-radius:980px; padding:8px 16px; cursor:pointer; }
  .wb-dir{ border-bottom:1px solid rgba(255,255,255,.06); }
  .wb-dir__head{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; padding:22px clamp(18px,4vw,40px) 0; color:#f5f5f7; }
  .wb-dir__tag{ font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#fff; background:var(--lens); border-radius:980px; padding:5px 12px; }
  .wb-dir__name{ font-family:var(--font-display); font-size:17px; font-weight:600; letter-spacing:-.01em; }
  .wb-dir__why{ font-size:13.5px; color:#a9a9b2; max-width:64ch; }
  .wb-seg{ display:inline-flex; gap:3px; margin-left:auto; padding:4px; border-radius:12px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); }
  .wb-seg button{ font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.7); background:transparent; border:0; cursor:pointer; padding:6px 12px; border-radius:8px; transition:background .18s var(--ease), color .18s var(--ease); }
  .wb-seg button:hover{ color:#fff; }
  .wb-seg button.is-on{ color:#fff; background:var(--lens); }

  /* ── section scaffolding ──────────────────────────────────────────── */
  .band{ position:relative; }
  .surf-light{ background:var(--bg-soft); color:var(--fg); }
  .surf-ink{ background:var(--bg-ink); color:var(--fg-on-dark); }
  .wrap{ max-width:var(--maxw); margin:0 auto; }

  /* Title size is PINNED — identical on light and ink, no jump on toggle. */
  .s-title{ font-family:var(--font-display); font-weight:600; font-size:clamp(34px,4.6vw,58px);
    line-height:1.05; letter-spacing:-.03em; text-wrap:balance; margin:18px 0 0; }
  .grad-word{ background:var(--lens); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .s-sub{ font-family:var(--font-text); font-size:clamp(17px,1.5vw,20px); line-height:1.5; color:var(--muted); margin:18px 0 0; }
  .surf-ink .s-sub{ color:var(--muted-on-dark); }

  /* ── confidence ring — from the EvalLense style guide ─────────────────
     conic from -90deg, semantic color (green = high), soft glow; a centre
     disc the colour of the surface turns it into a gauge with the readout
     inside. Fills 0→target via --v when its block reveals (.is-in). */
  .gring{
    --size:clamp(176px,21vw,232px);
    --c:var(--green); --track:var(--border-2); --center:#fff;
    --pct:calc(var(--v));
    position:relative; width:var(--size); height:var(--size); border-radius:50%;
    display:grid; place-items:center; text-align:center; flex:none;
    background:
      radial-gradient(circle at center, var(--center) 0 63%, transparent 64%),
      conic-gradient(from -90deg, var(--c) calc(var(--v) * 1%), var(--track) 0);
    filter:drop-shadow(0 0 12px color-mix(in oklab, var(--c) 30%, transparent));
    transition:--v 1.1s var(--ease);
  }
  .surf-ink .gring{ --track:var(--border-on-dark); --center:#0c0b12; }
  .gring__num{ position:relative; font-family:var(--font-mono); font-variant-numeric:tabular-nums;
    font-size:clamp(36px,4.6vw,52px); line-height:1; letter-spacing:-.02em; color:var(--fg); }
  .surf-ink .gring__num{ color:var(--fg-on-dark); }
  .gring__num::after{ counter-reset:p var(--pct); content:counter(p) "%"; }
  .gring__label{ position:relative; margin-top:7px; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--green); }
  .surf-ink .gring__label{ color:var(--green-on-dark); }
  .gring__cap{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.04em; line-height:1.4; text-align:center; max-width:32ch; color:var(--muted); margin:0; }
  .surf-ink .gring__cap{ color:var(--muted-on-dark); }

  /* ── breakdown bars — from the style guide (.brk), lens fill ───────── */
  .brk{ display:flex; flex-direction:column; gap:clamp(13px,1.8vw,18px); min-width:0; width:100%; }
  .brk__row{ display:grid; grid-template-columns:9ch 1fr 4ch; gap:14px; align-items:center; }
  .brk__k{ font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .surf-ink .brk__k{ color:var(--muted-on-dark); }
  .brk__bar{ height:8px; border-radius:999px; background:var(--bg-soft); overflow:hidden; }
  .surf-ink .brk__bar{ background:rgba(255,255,255,.08); }
  .brk__bar i{ display:block; height:100%; border-radius:999px; background:var(--lens); width:0; transition:width 1s var(--ease); }
  .brk__n{ font-family:var(--font-mono); font-size:13px; font-variant-numeric:tabular-nums; color:var(--fg); text-align:right; }
  .surf-ink .brk__n{ color:var(--fg-on-dark); }

  /* ── evidence placeholder ─────────────────────────────────────────── */
  .media-ph{ position:relative; display:flex; flex-direction:column; justify-content:flex-end; gap:6px;
    aspect-ratio:var(--ratio,16/10); width:100%; border:1px dashed var(--border); border-radius:var(--r-md);
    background:repeating-linear-gradient(135deg, color-mix(in oklab,var(--violet) 5%,transparent) 0 2px, transparent 2px 11px), var(--bg); padding:16px; overflow:hidden; }
  .surf-ink .media-ph{ border-color:var(--border-on-dark); background:repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 11px), var(--panel); }
  .media-ph__label{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .surf-ink .media-ph__label{ color:var(--muted-on-dark); }
  .media-ph__hint{ font-size:12.5px; line-height:1.4; color:var(--muted); max-width:46ch; }
  .surf-ink .media-ph__hint{ color:var(--muted-on-dark); }

  /* ── v1 — cinematic full-bleed (Direction C) ──────────────────────── */
  .cine{ position:relative; isolation:isolate; overflow:hidden; min-height:clamp(560px,82svh,780px);
    display:flex; align-items:center; padding:clamp(48px,6vw,96px) clamp(20px,5vw,72px); }
  .cine__scene{ position:absolute; inset:0; z-index:-2;
    background:radial-gradient(70% 60% at 72% 18%, color-mix(in oklab,var(--violet) 20%,transparent), transparent 60%),
      radial-gradient(56% 56% at 12% 96%, color-mix(in oklab,var(--cyan) 14%,transparent), transparent 62%), var(--bg-soft); }
  .surf-ink .cine__scene{ background:radial-gradient(78% 68% at 74% 14%, color-mix(in oklab,var(--violet) 40%,transparent), transparent 56%),
      radial-gradient(58% 58% at 12% 96%, color-mix(in oklab,var(--cyan) 22%,transparent), transparent 60%), linear-gradient(160deg,#0a0a0d 0%,#16131f 100%); }
  .cine__scene::after{ content:""; position:absolute; inset:0; background-image:radial-gradient(color-mix(in oklab,var(--fg) 7%,transparent) 1px,transparent 1px); background-size:24px 24px; opacity:.5;
    -webkit-mask-image:radial-gradient(ellipse at 62% 34%,#000,transparent 76%); mask-image:radial-gradient(ellipse at 62% 34%,#000,transparent 76%); }
  .surf-ink .cine__scene::after{ background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px); }
  .cine__scrim{ position:absolute; inset:0; z-index:-1; background:linear-gradient(90deg, color-mix(in oklab,var(--bg-soft) 90%,transparent) 0%, color-mix(in oklab,var(--bg-soft) 38%,transparent) 46%, transparent 74%); }
  .surf-ink .cine__scrim{ background:linear-gradient(90deg, rgba(5,5,8,.8) 0%, rgba(5,5,8,.42) 46%, transparent 74%); }
  .cine__tag{ position:absolute; top:16px; left:18px; z-index:1; font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); background:color-mix(in oklab,var(--bg) 70%,transparent); border:1px solid var(--border-2); border-radius:var(--r-pill); padding:4px 10px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
  .surf-ink .cine__tag{ color:var(--muted-on-dark); background:rgba(0,0,0,.32); border-color:var(--border-on-dark); }
  .cine__inner{ position:relative; z-index:1; width:100%; max-width:var(--maxw); margin:0 auto;
    display:grid; grid-template-columns:minmax(0,1fr) auto; gap:clamp(32px,5vw,72px); align-items:center; }
  .cine__copy{ min-width:0; max-width:34ch; }
  .cine__copy .s-title{ font-size:clamp(38px,5vw,68px); }
  .cine__copy .s-sub{ max-width:36ch; }
  .cine__chip{ display:flex; flex-direction:column; align-items:center; gap:14px; min-width:0; justify-self:end;
    padding:clamp(22px,2.6vw,32px); border-radius:var(--r-lg);
    background:color-mix(in oklab,var(--bg) 70%,transparent); border:1px solid var(--border); box-shadow:var(--sh-3);
    -webkit-backdrop-filter:blur(18px) saturate(1.4); backdrop-filter:blur(18px) saturate(1.4); }
  .surf-ink .cine__chip{ background:rgba(18,16,26,.5); border-color:rgba(255,255,255,.16); box-shadow:0 30px 70px -30px rgba(0,0,0,.7); }
  .cine__chip .gring{ --size:clamp(160px,16vw,200px); }

  /* ── v2 — gauge + weighted inputs (Direction B) ───────────────────── */
  .gauge{ padding:clamp(56px,8vw,120px) clamp(20px,5vw,72px); }
  .gauge__head{ max-width:760px; }
  .gauge__head .s-sub{ max-width:52ch; }
  .gauge__panel{ margin-top:clamp(34px,5vw,56px); display:grid; grid-template-columns:auto 1fr; gap:clamp(32px,5vw,68px); align-items:center;
    padding:clamp(26px,3.5vw,44px); border-radius:var(--radius-stage); background:#fff; border:1px solid var(--border); box-shadow:var(--sh-2); }
  .surf-ink .gauge__panel{ background:rgba(255,255,255,.04); border-color:var(--border-on-dark); box-shadow:var(--sh-3); }
  .gauge__readout{ display:flex; flex-direction:column; align-items:center; gap:13px; }
  .gauge__evidence{ margin-top:clamp(20px,3vw,32px); }
  .gauge__evidence .media-ph{ --ratio:16/10; }

  @media (max-width:900px){
    .cine__inner, .gauge__panel{ grid-template-columns:1fr; }
    .cine{ align-items:flex-start; }
    .cine__chip{ justify-self:start; margin-top:clamp(24px,5vw,40px); }
    .gauge__panel{ justify-items:center; }
  }
  @media (max-width:560px){ .brk__row{ grid-template-columns:8ch 1fr 4ch; } }
  @media (prefers-reduced-motion:reduce){ .gring{ transition:none; } .brk__bar i{ transition:none; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const DS = window.Evallense_c7d744 || {};
const Eyebrow = DS.Eyebrow || (({ children, onDark }) => (
  <span style={{fontFamily:"var(--font-mono)",fontSize:12,letterSpacing:".16em",textTransform:"uppercase",color:onDark?"var(--lavender)":"var(--violet)"}}>{children}</span>
));

const EYEBROW = "05 · Editorial split + scrub-ring";
const SUB = "For scoring, confidence, completeness, or progress, pair editorial copy with a visual that responds to scroll.";
const RING_CAP = "Scroll-driven — the arc and readout fill toward the target as the section enters view";
const BRK_CAP = "Demo · weighted inputs roll up to confidence";
const INPUTS = [ ["Team", 94], ["Market", 88], ["Traction", 90], ["Evidence", 96] ];

function Title(){
  return <h2 className="s-title">Show a <span className="grad-word">calculation</span>, not another paragraph</h2>;
}
function Ring({ target=92, size, cap, fill=0 }){
  // Concrete value (literal) so the registered --v transitions cleanly — a
  // calc(var*var) on a transitioned property does not evaluate in Blink.
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
      <div className="gring" style={{ "--v": fill * target, ...(size?{"--size":size}:{}) }} role="img" aria-label={`Confidence ${target}%, high`}>
        <span className="gring__num" aria-hidden="true"></span>
        <span className="gring__label">Confidence</span>
      </div>
      {cap ? <p className="gring__cap">{cap}</p> : null}
    </div>
  );
}
function Bars({ fill=0 }){
  return (
    <div className="brk">
      {INPUTS.map(([k,w]) => (
        <div className="brk__row" key={k}>
          <span className="brk__k">{k}</span>
          <span className="brk__bar"><i style={{ width: (fill * w) + "%" }}></i></span>
          <span className="brk__n">{w}</span>
        </div>
      ))}
    </div>
  );
}

/* The real page fills via ScrollFX (data-scrub → --scrub, a scroll rAF loop,
   no IntersectionObserver). Here we drive --scrub from state so the count-up
   is visible and screenshotable: it fills shortly after mount, Replay re-runs
   it. `fill` is 1 (full) or 0 (reset). */
function DirC({ surface, fill }){
  const ink = surface === "ink";
  return (
    <section className={`band cine ${ink?"surf-ink":"surf-light"}`}>
      <div className="cine__scene" role="img" aria-label="Evidence panel scene"></div>
      <span className="cine__tag">Image · evidence panel · 16:10 (full-bleed)</span>
      <div className="cine__scrim"></div>
      <div className="cine__inner">
        <div className="cine__copy">
          <Eyebrow onDark={ink}>{EYEBROW}</Eyebrow>
          <Title/>
          <p className="s-sub">{SUB}</p>
        </div>
        <div className="cine__chip">
          <Ring target={92} size="clamp(160px,16vw,200px)" cap={RING_CAP} fill={fill}/>
        </div>
      </div>
    </section>
  );
}
function DirB({ surface, fill }){
  const ink = surface === "ink";
  return (
    <section className={`band gauge ${ink?"surf-ink":"surf-light"}`}>
      <div className="wrap">
        <div className="gauge__head">
          <Eyebrow onDark={ink}>{EYEBROW}</Eyebrow>
          <Title/>
          <p className="s-sub">{SUB}</p>
        </div>
        <div className="gauge__panel">
          <div className="gauge__readout"><Ring target={92} cap={BRK_CAP} fill={fill}/></div>
          <Bars fill={fill}/>
        </div>
        <div className="gauge__evidence">
          <figure className="media-ph" style={{margin:0}} role="img" aria-label="Evidence panel visual slot">
            <span className="media-ph__label">Image · evidence panel · 16:10</span>
            <span className="media-ph__hint">A report surface with highlighted evidence rows and one lens-lit confidence indicator.</span>
          </figure>
        </div>
      </div>
    </section>
  );
}

const DIRECTIONS = [
  { key:"v1 · C", name:"Cinematic full-bleed", why:"Тёмная/светлая cinematic-сцена на всю полосу, копия слева, кольцо-confidence в glass-чипе справа. Кольцо из гайдлайна (conic, green=high, glow).", el:DirC, def:"ink" },
  { key:"v2 · B", name:"Gauge + weighted inputs", why:"Кольцо-gauge + breakdown-бары (как .brk в гайдлайне, lens-заливка) — «из чего складывается confidence». Бары и кольцо заполняются при входе в экран.", el:DirB, def:"ink" },
];

function App(){
  const [surfaces, setSurfaces] = useState(() => Object.fromEntries(DIRECTIONS.map(d => [d.key, d.def])));
  const [fill, setFill] = useState(0);
  const setSurf = (k,v) => setSurfaces(s => ({ ...s, [k]: v }));
  useEffect(() => { const t = setTimeout(() => setFill(1), 200); return () => clearTimeout(t); }, []);
  const replay = () => { setFill(0); setTimeout(() => setFill(1), 60); };
  return (
    <div>
      <div className="wb-bar">
        <h1>Section 05 · split + scrub-ring — 2 versions</h1>
        <button className="wb-replay" onClick={replay}>↺ Replay fill</button>
      </div>
      {DIRECTIONS.map(d => {
        const Dir = d.el;
        return (
          <div className="wb-dir" key={d.key}>
            <div className="wb-dir__head">
              <span className="wb-dir__tag">{d.key}</span>
              <span className="wb-dir__name">{d.name}</span>
              <span className="wb-dir__why">{d.why}</span>
              <div className="wb-seg" role="group" aria-label={`Surface ${d.key}`}>
                <button className={surfaces[d.key]==="light"?"is-on":""} onClick={() => setSurf(d.key,"light")}>Light</button>
                <button className={surfaces[d.key]==="ink"?"is-on":""} onClick={() => setSurf(d.key,"ink")}>Ink</button>
              </div>
            </div>
            <Dir surface={surfaces[d.key]} fill={fill} />
          </div>
        );
      })}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
