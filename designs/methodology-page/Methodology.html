<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EvalLense Methodology — How the AI Jury Scores Pitch Decks</title>

<!-- React first — the EvalLense bundle calls React.createElement -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- EvalLense design system — token stylesheets (closure order), primary group last -->
<link rel="stylesheet" href="_ds/evallense/tokens/colors.css" />
<link rel="stylesheet" href="_ds/evallense/tokens/typography.css" />
<link rel="stylesheet" href="_ds/evallense/tokens/radii-elevation.css" />
<link rel="stylesheet" href="_ds/evallense/tokens/gradients-surfaces.css" />
<link rel="stylesheet" href="_ds/evallense/tokens/components.css" />
<link rel="stylesheet" href="_ds/evallense/styles.css" />
<!-- bundle is plain compiled JS — regular <script>, never type=module/text/babel -->
<script src="_ds/evallense/_ds_bundle.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); font-family: var(--font-text); color: var(--fg); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }

  /* ---- layout primitives ---- */
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }
  .wrap-wide { max-width: 1320px; margin: 0 auto; padding: 0 var(--gutter); }
  .sec { padding: clamp(86px, 12vh, 150px) 0; position: relative; }
  .sec-light { background: var(--bg); color: var(--fg); }
  .sec-soft  { background: var(--bg-soft); color: var(--fg); }
  .sec-ink   { background: var(--ink); color: var(--fg-on-dark); }

  /* ---- type roles (page-scoped, built on DS tokens) ---- */
  .h2 { font-family: var(--font-display); font-weight: 600; letter-spacing: -.03em;
        font-size: clamp(32px, 4.6vw, 54px); line-height: 1.04; text-wrap: balance; margin: 0; }
  .h2.on-ink { color: var(--fg-on-dark); }
  .accent { background: var(--lens); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lead { font-family: var(--font-ui); font-size: clamp(17px, 1.5vw, 21px); line-height: 1.5;
          letter-spacing: -.01em; margin: 20px 0 0; max-width: 56ch; }
  .lead.on-light { color: var(--muted); }
  .lead.on-ink   { color: var(--body-on-dark); }
  .kicker { font-family: var(--font-mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }

  /* ---- header ---- */
  .hdr { position: sticky; top: 0; z-index: 40; display: flex; align-items: center; justify-content: space-between;
         padding: 15px var(--gutter); background: rgba(255,255,255,.72);
         backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8);
         border-bottom: 1px solid var(--border-2); }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 600; font-size: 17px; }
  .mark { width: 22px; height: 22px; border-radius: 50%; background: var(--lens);
          box-shadow: inset 0 0 0 1px rgba(255,255,255,.6), 0 4px 14px -4px var(--violet); }
  .nav { display: flex; gap: 28px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em;
         text-transform: uppercase; color: var(--muted); }
  .nav a { text-decoration: none; }
  .nav a[aria-current="page"] { color: var(--violet); }
  @media (max-width: 760px){ .nav { display: none; } }

  /* ---- hero (light) ---- */
  .hero { position: relative; overflow: hidden; padding: clamp(96px, 15vh, 168px) 0 clamp(72px, 10vh, 120px); }
  .hero-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(105% 90% at 82% 8%, color-mix(in oklab, var(--violet) 16%, transparent), transparent 56%),
      radial-gradient(90% 80% at 2% 96%, color-mix(in oklab, var(--cyan) 12%, transparent), transparent 60%),
      var(--bg); }
  .hero-bg::after { content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(40,30,90,.05) 1px, transparent 1px); background-size: 5px 5px; opacity: .55; }
  .hero .wrap-wide { position: relative; z-index: 1; }
  .hero-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: clamp(28px, 5vw, 72px); align-items: center; }
  .h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(40px, 6.4vw, 80px); line-height: 1.0;
        letter-spacing: -.035em; text-wrap: balance; margin: 18px 0 0; }
  .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 30px; }
  @media (max-width: 880px){ .hero-grid { grid-template-columns: 1fr; } .hero-art { order: -1; } }

  /* hero score card (brand "lens → score" visual) */
  .score-card { position: relative; background: var(--dsc-card); border: 1px solid var(--dsc-border-strong);
    border-radius: var(--radius-card); box-shadow: var(--dsc-shadow); padding: 26px; display: grid; gap: 18px; }
  .score-card .row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .deck-mini { display: grid; gap: 7px; }
  .deck-mini i { display: block; height: 7px; border-radius: 4px; background: color-mix(in oklab, var(--violet) 14%, var(--bg-soft)); }
  .deck-mini i:nth-child(1){ width: 76%; } .deck-mini i:nth-child(2){ width: 92%; }
  .deck-mini i:nth-child(3){ width: 60%; } .deck-mini i:nth-child(4){ width: 84%; }
  .score-meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .evi { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .evi b { color: var(--fg); font-weight: 600; }

  /* ---- progress ring (lens conic, light + ink variants) ---- */
  .ring { --p: 0; position: relative; width: 132px; aspect-ratio: 1; border-radius: 50%; flex: none;
    background:
      conic-gradient(from -90deg, var(--violet) 0deg, var(--lavender) calc(var(--p) * 1.6deg),
        var(--cyan) calc(var(--p) * 2.7deg), var(--aqua) calc(var(--p) * 3.6deg), var(--ring-track) 0); }
  .ring::before { content: ""; position: absolute; inset: 12px; border-radius: 50%; background: var(--ring-hole); }
  .ring--light { --ring-track: rgba(108,76,241,.14); --ring-hole: #fff; box-shadow: var(--sh-2); }
  .ring--ink   { --ring-track: rgba(255,255,255,.10); --ring-hole: var(--panel); }
  .ring--lg { width: clamp(200px, 26vw, 280px); }
  .ring__label { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; gap: 2px; }
  .ring__num { font-family: var(--font-display); font-weight: 600; letter-spacing: -.02em; }
  .ring--light .ring__num { color: var(--fg); }
  .ring--ink .ring__num { color: var(--fg-on-dark); }
  .ring__cap { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted-2); }

  /* ---- numbered principles (ink) ---- */
  .num-list { display: grid; gap: 0; margin-top: clamp(36px, 5vw, 56px); }
  .num-item { display: grid; grid-template-columns: 92px 1fr; gap: clamp(16px, 3vw, 40px);
    padding: clamp(26px, 3.4vw, 38px) 0; border-top: 1px solid var(--border-on-dark-2); align-items: baseline; }
  .num-item:last-child { border-bottom: 1px solid var(--border-on-dark-2); }
  .num-idx { font-family: var(--font-display); font-weight: 600; font-size: clamp(34px, 4vw, 52px);
    letter-spacing: -.03em; line-height: .9; color: transparent; background: var(--lens);
    -webkit-background-clip: text; background-clip: text; }
  .num-h { font-family: var(--font-display); font-weight: 600; font-size: clamp(20px, 2vw, 26px);
    letter-spacing: -.02em; color: var(--fg-on-dark); margin: 0 0 8px; }
  .num-b { font-family: var(--font-ui); font-size: 16px; line-height: 1.55; color: var(--body-on-dark); margin: 0; max-width: 60ch; }
  @media (max-width: 640px){ .num-item { grid-template-columns: 1fr; gap: 6px; } }

  /* ---- pipeline (pinned multi-screen, light) ---- */
  .pin-wrap { position: relative; }
  .pin-sticky { position: sticky; top: 64px; }
  .pipe-grid { display: grid; grid-template-columns: 320px 1fr; gap: clamp(28px, 4vw, 56px); align-items: start; }
  .pipe-rail { display: grid; gap: 6px; }
  .pipe-step { display: grid; grid-template-columns: 30px 1fr; gap: 13px; align-items: start; padding: 14px 16px;
    border-radius: var(--r-md); cursor: pointer; transition: background .35s var(--ease), box-shadow .35s var(--ease);
    background: transparent; }
  .pipe-step[data-on="true"] { background: var(--bg); box-shadow: var(--sh-2), inset 0 0 0 1px var(--border-2); }
  .pipe-dot { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-family: var(--font-mono);
    font-size: 11px; color: var(--muted); background: #fff; box-shadow: inset 0 0 0 1px var(--border-2); transition: all .35s var(--ease); }
  .pipe-step[data-on="true"] .pipe-dot { color: #fff; background: var(--violet); box-shadow: 0 8px 20px -8px var(--violet); }
  .pipe-name { font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing: -.01em; color: var(--fg); }
  .pipe-step[data-on="false"] .pipe-name { color: var(--muted); }
  .pipe-stage { border-radius: var(--radius-stage); background: #fff; border: 1px solid var(--border-2);
    box-shadow: var(--sh-3); overflow: hidden; min-height: 360px; }
  .stage-bar { display: flex; align-items: center; gap: 8px; padding: 13px 18px; border-bottom: 1px solid var(--border-2); }
  .stage-bar i { width: 10px; height: 10px; border-radius: 50%; background: var(--border-2); }
  .stage-bar i:last-of-type { background: var(--lens); }
  .stage-bar span { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: 8px; }
  .stage-body { padding: clamp(26px, 3vw, 40px); }
  .stage-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--violet); }
  .stage-h { font-family: var(--font-display); font-weight: 600; font-size: clamp(24px, 2.6vw, 34px); letter-spacing: -.02em;
    margin: 12px 0 14px; color: var(--fg); }
  .stage-p { font-family: var(--font-ui); font-size: 17px; line-height: 1.55; color: var(--muted); margin: 0; max-width: 52ch; }
  .stage-track { display: flex; gap: 6px; margin-top: 26px; }
  .stage-track b { height: 4px; flex: 1; border-radius: 3px; background: var(--border-2); transition: background .35s var(--ease); }
  .stage-track b[data-done="true"] { background: var(--lens); }
  @media (max-width: 820px){ .pipe-grid { grid-template-columns: 1fr; } .pin-sticky { position: static; } }

  /* ---- judges gallery (ink) ---- */
  .gallery { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(300px, 340px); gap: 16px;
    overflow-x: auto; padding: 4px 0 18px; scroll-snap-type: x mandatory; scrollbar-width: thin; }
  .gallery::-webkit-scrollbar { height: 8px; }
  .gallery::-webkit-scrollbar-thumb { background: var(--border-on-dark); border-radius: 8px; }
  .judge { scroll-snap-align: start; background: var(--panel); border: 1px solid var(--border-on-dark-2);
    border-radius: var(--radius-card); padding: 26px; display: grid; gap: 14px; align-content: start; }
  .judge .jhead { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .jname { font-family: var(--font-display); font-weight: 600; font-size: 23px; letter-spacing: -.02em; color: var(--fg-on-dark); }
  .jcode { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--tag-tint);
    border: 1px solid var(--border-on-dark); border-radius: var(--r-pill); padding: 4px 9px; }
  .jq { font-family: var(--font-ui); font-style: italic; font-size: 16px; line-height: 1.45; color: var(--fg-on-dark); margin: 0; }
  .jlook { font-family: var(--font-ui); font-size: 14px; line-height: 1.5; color: var(--muted-on-dark); margin: 0; }
  .jlook b { color: var(--lavender); font-weight: 600; font-family: var(--font-mono); font-size: 10px;
    letter-spacing: .12em; text-transform: uppercase; display: block; margin-bottom: 6px; }

  /* coverage strip */
  .cov { margin-top: clamp(48px, 6vw, 80px); padding-top: clamp(40px, 5vw, 64px); border-top: 1px solid var(--border-on-dark-2); }
  .cov-grid { display: grid; gap: 2px; margin-top: 30px; }
  .cov-row { display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center;
    padding: 16px 4px; border-bottom: 1px solid var(--border-on-dark-2); }
  .cov-name { font-family: var(--font-ui); font-size: 16px; color: var(--fg-on-dark); }
  .cov-dots { display: flex; gap: 7px; align-items: center; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot--lead { background: var(--lens); box-shadow: 0 0 0 3px color-mix(in oklab, var(--violet) 30%, transparent); }
  .dot--cross { background: transparent; border: 1.5px solid var(--border-on-dark); }
  .cov-reads { font-family: var(--font-mono); font-size: 12px; color: var(--muted-on-dark); white-space: nowrap; min-width: 64px; text-align: right; }
  .cov-legend { display: flex; gap: 22px; margin-top: 22px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted-on-dark); }
  .cov-legend span { display: inline-flex; align-items: center; gap: 8px; }
  @media (max-width: 560px){ .cov-row { grid-template-columns: 1fr; gap: 10px; } .cov-reads { text-align: left; } }

  /* ---- rubric (light editorial split) ---- */
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px, 5vw, 72px); align-items: center; }
  @media (max-width: 860px){ .split { grid-template-columns: 1fr; } }
  .proc { display: grid; gap: 0; margin-top: 30px; }
  .proc-item { display: grid; grid-template-columns: 34px 1fr; gap: 16px; padding: 18px 0; border-top: 1px solid var(--border-2); }
  .proc-item:last-child { border-bottom: 1px solid var(--border-2); }
  .proc-n { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-family: var(--font-mono);
    font-size: 12px; color: var(--violet); border: 1px solid var(--dsc-border-strong); }
  .proc-h { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -.01em; color: var(--fg); margin: 0 0 4px; }
  .proc-b { font-family: var(--font-ui); font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0; }
  .scale { background: var(--dsc-card); border: 1px solid var(--dsc-border); border-radius: var(--radius-card);
    box-shadow: var(--dsc-shadow); padding: 28px; }
  .scale-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; border-radius: 12px; overflow: hidden; }
  .band { padding: 16px 14px; min-height: 96px; display: flex; flex-direction: column; justify-content: flex-end; gap: 6px; }
  .band:nth-child(1){ background: color-mix(in oklab, var(--violet) 7%, #fff); }
  .band:nth-child(2){ background: color-mix(in oklab, var(--violet) 16%, #fff); }
  .band:nth-child(3){ background: color-mix(in oklab, var(--cyan) 20%, #fff); }
  .band:nth-child(4){ background: color-mix(in oklab, var(--aqua) 26%, #fff); }
  .band b { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--fg); }
  .band span { font-family: var(--font-ui); font-size: 12px; line-height: 1.35; color: var(--amber-ink); }
  .band:nth-child(3) span, .band:nth-child(4) span { color: var(--fg); }
  .scale-flow { display: flex; align-items: center; gap: 10px; margin-top: 22px; flex-wrap: wrap;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .scale-flow b { color: var(--violet); }
  .scale-flow i { color: var(--border); font-style: normal; }

  /* ---- scoring (ink editorial split + ring) ---- */
  .pts { display: grid; gap: 0; margin-top: 28px; }
  .pt { padding: 16px 0; border-top: 1px solid var(--border-on-dark-2); }
  .pt:last-child { border-bottom: 1px solid var(--border-on-dark-2); }
  .pt b { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--fg-on-dark); display: block; margin-bottom: 4px; }
  .pt span { font-family: var(--font-ui); font-size: 15px; line-height: 1.5; color: var(--body-on-dark); }
  .ring-stage { display: grid; place-items: center; gap: 22px; }
  .ring-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

  /* ---- human-in-the-loop (light split) ---- */
  .pull { background: var(--ink); color: var(--fg-on-dark); border-radius: var(--radius-stage);
    padding: clamp(34px, 4vw, 52px); position: relative; overflow: hidden; box-shadow: var(--sh-3); }
  .pull::before { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(90% 120% at 100% 0%, rgba(108,76,241,.32), transparent 58%); }
  .pull-q { position: relative; font-family: var(--font-display); font-weight: 600; font-size: clamp(24px, 3vw, 34px);
    line-height: 1.18; letter-spacing: -.02em; margin: 0; text-wrap: balance; }
  .pull-tag { position: relative; margin-top: 22px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted-on-dark); }

  /* ---- final cta (ink) ---- */
  .cta { position: relative; text-align: center; overflow: hidden;
    background: radial-gradient(78% 120% at 50% 0%, rgba(108,76,241,.30), transparent 60%), var(--ink); }
  .cta .h2 { margin-inline: auto; }
  .cta .lead { margin-inline: auto; }
  .cta-row.center { justify-content: center; }

  /* ---- footer ---- */
  .ftr { background: var(--panel); color: var(--fg-on-dark); padding: clamp(56px, 7vw, 88px) 0 40px; border-top: 1px solid var(--border-on-dark-2); }
  .ftr-grid { display: grid; grid-template-columns: 1.4fr repeat(3, 1fr); gap: 32px; }
  .ftr-col h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted-on-dark); margin: 0 0 16px; }
  .ftr-col a { display: block; font-family: var(--font-ui); font-size: 14px; color: var(--body-on-dark);
    text-decoration: none; margin-bottom: 10px; }
  .ftr-col a:hover { color: var(--fg-on-dark); }
  .ftr-col a[aria-current="page"] { color: var(--lavender); }
  .ftr-bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: clamp(40px, 5vw, 64px);
    padding-top: 26px; border-top: 1px solid var(--border-on-dark-2); font-family: var(--font-mono); font-size: 11px;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted-2); }
  @media (max-width: 760px){ .ftr-grid { grid-template-columns: 1fr 1fr; } }

  /* ---- reveal motion ---- */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .8s var(--ease), transform .8s var(--ease); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce){
    html { scroll-behavior: auto; }
    .reveal { opacity: 1; transform: none; transition: none; }
  }
</style>
</head>
