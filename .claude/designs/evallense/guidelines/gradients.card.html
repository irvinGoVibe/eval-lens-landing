<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-text);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
  .bar{height:34px;width:300px;border-radius:var(--r-sm);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
</style></head>
<body>
  <div class="row"><div class="bar" style="background:var(--lens)"></div><span class="n">--lens (signature accent)</span></div>
  <div class="row"><div class="bar" style="background:var(--lens-soft)"></div><span class="n">--lens-soft (low-glare wash)</span></div>
  <div class="row"><div class="bar" style="background:var(--fire)"></div><span class="n">--fire (orange bridge only)</span></div>
  <div class="row"><div class="bar" style="background:var(--grad-cta)"></div><span class="n">--grad-cta (in-app CTA)</span></div>
</body></html>
