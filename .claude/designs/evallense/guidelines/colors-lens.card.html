<!-- @dsCard group="Colors" viewport="700x180" name="Lens accents" subtitle="The brand signature gradient + its stops" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-text);}
  .bar{height:46px;border-radius:var(--r-sm);background:var(--lens);margin-bottom:16px;}
  .sw{display:flex;gap:14px;flex-wrap:wrap;}
  .chip{display:flex;flex-direction:column;gap:6px;}
  .dot{width:64px;height:46px;border-radius:var(--r-xs);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.04em;}
</style></head>
<body>
  <div class="bar"></div>
  <div class="sw">
    <div class="chip"><div class="dot" style="background:var(--violet)"></div><span class="n">--violet</span></div>
    <div class="chip"><div class="dot" style="background:var(--violet-2)"></div><span class="n">--violet-2</span></div>
    <div class="chip"><div class="dot" style="background:var(--lavender)"></div><span class="n">--lavender</span></div>
    <div class="chip"><div class="dot" style="background:var(--cyan)"></div><span class="n">--cyan</span></div>
    <div class="chip"><div class="dot" style="background:var(--aqua)"></div><span class="n">--aqua</span></div>
    <div class="chip"><div class="dot" style="background:var(--tag-tint)"></div><span class="n">--tag-tint</span></div>
  </div>
</body></html>
