<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:0;font-family:var(--font-text);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;height:150px;}
  .s{display:flex;align-items:flex-end;padding:14px;font-family:var(--font-mono);font-size:11px;}
  .light{background:var(--bg);color:var(--fg);}
  .soft{background:var(--bg-soft);color:var(--fg);}
  .ink{background:var(--ink);color:var(--fg-on-dark);}
  .panel{background:var(--panel-2);color:var(--fg-on-dark);}
</style></head>
<body>
  <div class="s light">--bg</div>
  <div class="s soft">--bg-soft</div>
  <div class="s ink">--ink</div>
  <div class="s panel">--panel-2</div>
</body></html>
