<!-- @dsCard group="Colors" viewport="700x160" name="Warm orange bridge" subtitle="Reserved for the bridge surface only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--orange-deep);font-family:var(--font-text);}
  .bar{height:42px;border-radius:var(--r-sm);background:var(--fire);margin-bottom:16px;}
  .sw{display:flex;gap:14px;flex-wrap:wrap;}
  .chip{display:flex;flex-direction:column;gap:6px;}
  .dot{width:74px;height:42px;border-radius:var(--r-xs);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--orange-soft);}
</style></head>
<body>
  <div class="bar"></div>
  <div class="sw">
    <div class="chip"><div class="dot" style="background:var(--orange-hot)"></div><span class="n">--orange-hot</span></div>
    <div class="chip"><div class="dot" style="background:var(--orange-core)"></div><span class="n">--orange-core</span></div>
    <div class="chip"><div class="dot" style="background:var(--orange-soft)"></div><span class="n">--orange-soft</span></div>
    <div class="chip"><div class="dot" style="background:var(--orange-warm)"></div><span class="n">--orange-warm</span></div>
  </div>
</body></html>
