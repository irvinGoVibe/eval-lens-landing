<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:32px;background:var(--bg);font-family:var(--font-text);}
  h1{font-family:var(--font-display);font-weight:600;font-size:clamp(40px,7vw,68px);line-height:1.03;letter-spacing:-.03em;text-wrap:balance;color:var(--fg);margin:0;}
  .accent{background:var(--lens);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:18px;}
</style></head>
<body>
  <h1>Lens Your<br><span class="accent">Next Unicorn</span></h1>
  <p class="n">--font-display · weight 600 · letter-spacing -.03em · text-wrap balance · one accent phrase on --lens</p>
</body></html>
