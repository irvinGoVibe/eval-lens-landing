<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:30px;background:var(--bg-soft);font-family:var(--font-text);}
  .sw{display:flex;gap:28px;flex-wrap:wrap;}
  .chip{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .box{width:120px;height:72px;border-radius:var(--r-md);background:var(--bg);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
</style></head>
<body>
  <div class="sw">
    <div class="chip"><div class="box" style="box-shadow:var(--sh-1)"></div><span class="n">--sh-1</span></div>
    <div class="chip"><div class="box" style="box-shadow:var(--sh-2)"></div><span class="n">--sh-2</span></div>
    <div class="chip"><div class="box" style="box-shadow:var(--sh-3)"></div><span class="n">--sh-3</span></div>
  </div>
</body></html>
