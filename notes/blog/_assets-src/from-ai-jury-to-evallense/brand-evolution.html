<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  :root{--ink:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.10);
    --lens:linear-gradient(118deg,#6c4cf1,#a99bff,#2ec5e8,#36e0c2);}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1500px;height:1000px}
  body{font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;color:var(--ink);background:#fff;
    display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  .bg{position:fixed;inset:0;background:
    radial-gradient(900px 520px at 50% -10%,rgba(108,76,241,.06),transparent 60%),
    radial-gradient(900px 520px at 50% 115%,rgba(54,224,194,.06),transparent 60%),#fff}
  .scene{position:relative;text-align:center;width:1280px}
  .eyebrow{font:600 15px/1 "SF Mono",ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-bottom:60px}
  .row{display:flex;align-items:center;justify-content:center;gap:64px}
  .mark{display:flex;flex-direction:column;align-items:center;gap:18px}
  .badge{font:600 12px/1 "SF Mono",ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--line);padding:7px 14px;border-radius:999px}
  .old .word{font-size:64px;font-weight:680;letter-spacing:-.02em;color:#c7c7cf}
  .old .word b{color:#a9a9b2;font-weight:680}
  .arrow{font-size:46px;color:#cfcfd6}
  .new{position:relative}
  .new .lensmark{width:78px;height:78px;border-radius:50%;background:var(--lens);margin:0 auto 16px;
    position:relative;box-shadow:0 16px 40px rgba(108,76,241,.30)}
  .new .lensmark:after{content:"";position:absolute;inset:24px;border-radius:50%;
    background:radial-gradient(circle at 40% 38%,#fff,rgba(255,255,255,.4))}
  .new .word{font-size:66px;font-weight:720;letter-spacing:-.025em}
  .new .word b{background:var(--lens);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{margin-top:64px;font-size:22px;color:var(--muted)}
  .tagline b{color:var(--ink);font-weight:640}
  .ph{position:absolute;left:0;right:0;bottom:-150px;font:600 12px/1 "SF Mono",ui-monospace,monospace;
    letter-spacing:.07em;text-transform:uppercase;color:#c4c4ca}
</style></head>
<body>
<div class="bg"></div>
<div class="scene">
  <div class="eyebrow">A jury decides · a lens reveals</div>
  <div class="row">
    <div class="mark old">
      <span class="badge">v1 · origin</span>
      <div class="word">AI&nbsp;<b>Jury</b></div>
    </div>
    <div class="arrow">→</div>
    <div class="mark new">
      <span class="badge">today</span>
      <div class="lensmark"></div>
      <div class="word">Eval<b>Lense</b></div>
    </div>
  </div>
  <div class="tagline">A jury decides. <b>We did not want the system to decide.</b></div>
</div>
</body></html>
