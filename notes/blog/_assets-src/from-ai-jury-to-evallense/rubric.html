<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  :root{--ink:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.10);
    --lens:linear-gradient(118deg,#6c4cf1,#a99bff,#2ec5e8,#36e0c2);}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1500px;height:1000px}
  body{font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;color:var(--ink);background:#fff;
    display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  .bg{position:fixed;inset:0;background:
    radial-gradient(900px 480px at 50% -12%,rgba(108,76,241,.06),transparent 60%),
    radial-gradient(900px 480px at 50% 118%,rgba(54,224,194,.06),transparent 60%),#fff}
  .scene{position:relative;width:880px;text-align:center}
  .eyebrow{font:600 14px/1 "SF Mono",ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:12px}
  .title{font-size:31px;font-weight:680;letter-spacing:-.02em;margin-bottom:34px}
  .title b{background:var(--lens);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ladder{display:flex;flex-direction:column;gap:11px;text-align:left}
  .step{display:flex;align-items:center;gap:18px;padding:16px 22px;border:1px solid var(--line);
    border-radius:16px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.03),0 12px 30px rgba(108,76,241,.04)}
  .num{flex:none;width:34px;height:34px;border-radius:10px;background:#f1f1f4;color:#3a3a3f;
    font:650 15px/34px "SF Mono",ui-monospace,monospace;text-align:center}
  .lab{font-size:18.5px;font-weight:520}
  .step.final{background:var(--lens);border:none;box-shadow:0 18px 44px rgba(108,76,241,.28)}
  .step.final .num{background:rgba(255,255,255,.22);color:#fff}
  .step.final .lab{color:#fff;font-weight:660}
  .conn{height:11px;width:2px;background:var(--line);margin:-11px auto 0;display:block}
  .caption{margin-top:30px;font-size:19px;color:var(--muted)}
  .caption b{color:var(--ink);font-weight:660}
</style></head>
<body>
<div class="bg"></div>
<div class="scene">
  <div class="eyebrow">The rubric as an execution contract</div>
  <div class="title">We force the <b>reverse order</b> — so the score can't be picked first</div>
  <div class="ladder">
    <div class="step"><span class="num">1</span><span class="lab">Read the rubric</span></div>
    <div class="step"><span class="num">2</span><span class="lab">Review the decoded deck</span></div>
    <div class="step"><span class="num">3</span><span class="lab">Identify strengths</span></div>
    <div class="step"><span class="num">4</span><span class="lab">Identify weaknesses</span></div>
    <div class="step"><span class="num">5</span><span class="lab">List what is missing</span></div>
    <div class="step"><span class="num">6</span><span class="lab">Choose the rubric band</span></div>
    <div class="step final"><span class="num">7</span><span class="lab">Produce the score</span></div>
  </div>
  <div class="caption"><b>Analysis first, score second.</b></div>
</div>
</body></html>
